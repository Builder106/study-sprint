name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs when a new commit lands on the same branch — keeps the
# E2E job from racing itself against the shared Supabase demo account.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task fmt:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install deps
        run: deno install --allow-scripts=npm:@tailwindcss/oxide
      - run: deno task check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install deps
        # package.json mirrors deno.json for Node/Vercel build environments.
        # Deno's npm runtime has a require.resolve incompatibility with
        # @tailwindcss/node on Linux; Node avoids this entirely.
        run: npm install --legacy-peer-deps
      - name: Build
        # Vite inlines VITE_* values at build time. CI builds with placeholders
        # so we can verify "is this buildable?" without exposing real keys to
        # PR forks. The deployed bundle is built locally with real .env values
        # via `vercel --prod --yes`.
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task test:unit

  # E2E only runs on push to main (not on every PR push). The suite hits the
  # real Supabase project — running it from PR CI would race against local dev
  # on the shared demo account and burn through Supabase's signup rate limit.
  # Promote-time gate is sufficient for a solo workflow.
  e2e:
    name: E2E
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fmt, lint, typecheck, build, unit]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install deps
        run: deno install --allow-scripts=npm:@tailwindcss/oxide
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('deno.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
      - name: Bootstrap demo account
        run: deno task test:setup
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      - name: Run E2E suite
        run: deno task test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  deploy:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [e2e]
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_QBH0412lFDlXgxDpQuY75YAp
      VERCEL_PROJECT_ID: prj_45WW8wwWB3Q3DtJPCpaktowmI66l
    steps:
      - uses: actions/checkout@v4
      - name: Pull project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
